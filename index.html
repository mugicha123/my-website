<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@500&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
        <style>
            .noto-sans-jp {
                font-family: "Noto Sans JP", sans-serif;
                font-optical-sizing: auto;
                font-weight: 700;
                font-style: normal;
            }
            /* Reset CSS */
            html, body{
                width: 100%;
            }

            nav {
                width: 100%;
                height: 70px;
                background-color: dimgray;
                padding-top: 5px;
                box-sizing: border-box;
                position: fixed;
                top: 0;
                left: 0;
            }

            ul {
                display: flex;
            }

            li {
                list-style: none;
            }

            a {
                display: block;
                text-decoration: none;
                color: white;
                margin-right: 35px;
            }

            a:hover {
                color: rgb(213, 255, 173);
            }

        </style>
    </head>
    <body>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">サービス紹介</a></li>
                <li><a href="#">最新情報</a></li>
                <li><a href="#">ブログ</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </nav>

        <p class="noto-sans-jp">Hello, World!</p>
    </body>
</html>
